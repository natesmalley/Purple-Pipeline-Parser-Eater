# Event Ingestion Configuration
# Loaded by EventIngestManager
# Supports 6 event source types with normalized output to message bus

# Message Bus (where normalized events are published)
message_bus:
  type: "memory"  # Options: memory, kafka, redis
  output_topic: "raw-security-events"
  # Kafka-specific config (if type: kafka)
  # kafka:
  #   bootstrap_servers: "localhost:9092"
  # Redis-specific config (if type: redis)
  # redis:
  #   host: "localhost"
  #   port: 6379

# Kafka Source - Consume from Kafka topics
kafka:
  enabled: false
  bootstrap_servers: "localhost:9092"
  topics:
    - "security-events"
    - "netskope-alerts"
  consumer_group: "pppe-event-ingestion"
  batch_size: 100
  auto_offset_reset: "earliest"
  enable_auto_commit: true
  source_id: "kafka-default"
  parser_id: "generic_kafka_event"

# SCOL API Sources - Poll REST APIs with checkpoint management
scol_api:
  enabled: false
  checkpoint_db: "data/scol_checkpoints.db"
  sources:
    - name: "netskope_alerts"
      source_id: "netskope-api"
      api_url: "https://tenant.goskope.com/api/v2/events/data/alert"
      auth_token: "${NETSKOPE_API_TOKEN}"
      poll_interval_secs: 60
      checkpoint_key: "netskope_last_timestamp"
      parser_id: "netskope_dlp"
      query_params:
        type: "policy,DLP,malware"

    - name: "m365_audit"
      source_id: "m365-api"
      api_url: "https://manage.office.com/api/v1.0/activity/content"
      auth_token: "${M365_API_TOKEN}"
      poll_interval_secs: 300
      checkpoint_key: "m365_last_timestamp"
      parser_id: "m365_audit_logs"

# S3 Sources - Process events from S3 buckets
s3:
  enabled: false
  buckets:
    - name: "security-logs-bucket"
      source_id: "s3-netskope"
      bucket: "security-logs-bucket"
      region: "us-east-1"
      prefix: "netskope/alerts/"
      format: "jsonl"
      compression: "gzip"
      parser_id: "netskope_dlp"

    - name: "cloudtrail-logs"
      source_id: "s3-cloudtrail"
      bucket: "cloudtrail-logs"
      region: "us-east-1"
      prefix: "AWSLogs/"
      format: "json"
      compression: "none"
      parser_id: "aws_cloudtrail"

# Azure Event Hubs - Consume from Azure Event Hubs
azure:
  enabled: false
  event_hubs:
    - name: "security-events-hub"
      source_id: "azure-eh-1"
      connection_string: "${AZURE_EVENTHUB_CONNECTION}"
      event_hub_name: "security-events"
      consumer_group: "pppe-consumer"
      checkpoint_store_connection: "${AZURE_STORAGE_CONNECTION}"
      parser_id: "azure_sentinel_alerts"

# GCP Pub/Sub - Consume from Google Cloud Pub/Sub
gcp:
  enabled: false
  subscriptions:
    - name: "gcp-security-logs"
      source_id: "gcp-pubsub-1"
      project_id: "my-project-123"
      subscription_id: "security-events-sub"
      credentials_file: "${GCP_CREDENTIALS_FILE}"
      parser_id: "gcp_audit_logs"
      max_messages: 100

# Syslog HEC - HTTP Event Collector endpoint
syslog_hec:
  enabled: false
  host: "0.0.0.0"
  port: 8088
  ssl_enabled: false
  # ssl_cert_path: "/path/to/cert.pem"
  # ssl_key_path: "/path/to/key.pem"
  auth_tokens:
    - "${HEC_TOKEN}"
  default_parser_id: "generic_syslog"

  # Route specific sources to different parsers
  source_routing:
    "netskope": "netskope_dlp"
    "palo-alto": "palo_alto_firewall"
    "splunk": "splunk_event"
