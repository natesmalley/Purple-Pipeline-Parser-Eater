# Runtime Transform Pipeline Configuration
# Used by: services/runtime_service.py

message_bus:
  type: kafka  # Options: kafka, redis, memory

  # Kafka configuration
  bootstrap_servers: "localhost:9092"
  input_topic: "raw-security-events"
  output_topic: "ocsf-events"
  consumer_group: "transform-workers"

  # Consumer settings
  consumer_config:
    auto_offset_reset: "earliest"
    enable_auto_commit: true
    max_poll_records: 100

executor:
  type: lupa  # Options: lupa (in-process), dataplane (subprocess)

  # Dataplane executor config (if type: dataplane)
  dataplane_binary: "/opt/dataplane/dataplane"
  timeout_seconds: 30

# Transform worker configuration
transform_worker:
  input_topic: "raw-security-events"
  output_topic: "ocsf-events"

# Manifest directory containing parser artifacts
manifest_directory: "./output"

# Lua code caching
lua_cache_size: 100

# Canary routing configuration
canary:
  enabled: true
  promotion_threshold: 1000  # Minimum events before promotion
  error_tolerance: 0.01      # Allow 1% higher error rate for canary

# Error handling
error_handling:
  retry_attempts: 3
  retry_backoff_seconds: 5
  dlq_enabled: true
  dlq_topic: "transform-errors"
  fallback_strategy: "dlq"  # Options: dlq, drop, passthrough

# Performance settings
performance:
  max_concurrent_transforms: 50
  event_queue_size: 1000

# Logging configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/runtime_service.log"
