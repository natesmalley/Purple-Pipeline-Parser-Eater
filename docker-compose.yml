# Purple Pipeline Parser Eater - Production Docker Compose
# STIG Hardened | Network Isolated | Security Focused
# NOTE: NOT FIPS 140-2 certified (requires Red Hat UBI base image)

# ============================================================================
# Networks - Isolated with internal-only communication
# ============================================================================
networks:
  parser-network:
    driver: bridge

# ============================================================================
# Volumes - Persistent data with restricted access
# ============================================================================
volumes:
  milvus-data:
    driver: local
  etcd-data:
    driver: local
  minio-data:
    driver: local
  app-output:
    driver: local
  app-logs:
    driver: local
  app-data:
    driver: local

# ============================================================================
# Services
# ============================================================================
services:

  # ==========================================================================
  # Purple Pipeline Parser Eater Application
  # ==========================================================================
  parser-eater:
    build: .
    image: ${PPPE_IMAGE:-ghcr.io/natesmalley/purple-pipeline-parser-eater}:${PPPE_TAG:-latest}
    container_name: purple-parser-eater
    hostname: parser-eater

    # Security: Run as non-root user
    user: "999:999"

    # SECURITY FIX: Enable read-only root filesystem (STIG V-230285)
    read_only: true

    # Security: Restrict capabilities (STIG V-230286)
    # SECURITY FIX: Removed NET_BIND_SERVICE (not needed for port 8080)
    cap_drop:
      - ALL

    # Security: No new privileges (STIG V-230287)
    # FIXED: Removed seccomp:unconfined for production security
    # If Python runtime issues occur, use custom hardened seccomp profile
    security_opt:
      - no-new-privileges:true

    # Resource Limits (STIG V-230290)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G

    # Environment Variables
    environment:
      # Python Configuration
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONHASHSEED=0
      - PYTHONSAFEPATH=1

      # Milvus Connection
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530

      # Application Configuration
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - WEB_UI_HOST=0.0.0.0
      - WEB_UI_PORT=8080
      # Web UI auth (Stream H, 2026-04-28): self-bootstrapping. If unset
      # at boot, the app generates a fresh token, persists it to
      # /app/data/state/web_ui_auth.token (mode 0600, on the app-data
      # volume so it survives restarts), and logs it in a [BOOTSTRAP]
      # banner at startup. Operators can override by setting this env
      # var (e.g. via secrets-manager injection). Pass-through with empty
      # default — DO NOT add ${VAR:?} hard-fail.
      - WEB_UI_AUTH_TOKEN=${WEB_UI_AUTH_TOKEN:-}
      # Stream A3 — TLS terminated by upstream proxy (default 1 since the
      # compose deployment runs behind ingress / nginx in production).
      - WEB_UI_TLS_TERMINATED_UPSTREAM=${WEB_UI_TLS_TERMINATED_UPSTREAM:-1}
      # Stream H (2026-04-28): self-bootstrapping. If unset, the app
      # generates a fresh key and persists to /app/data/state/flask_secret.key
      # (mode 0600). Sessions survive restarts as long as the file exists.
      # Operators can override via env var; pass-through with empty default.
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      # Stream A1 — single shared StateStore on the app-data volume.
      - STATE_STORE_PATH=/app/data/state/pending_state.json
      - FEEDBACK_CHANNEL_PATH=/app/data/feedback/actions.jsonl
      - RUNTIME_SNAPSHOT_PATH=/app/data/runtime/status_snapshot.json
      - RUNTIME_PENDING_REQUESTS_PATH=/app/data/runtime/pending_requests.json
      # Stream A6 — singleton gunicorn worker by default.
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      - TMPDIR=/app/data/tmp
      - TMP=/app/data/tmp
      - TEMP=/app/data/tmp

      # SECURITY: API Keys from .env file
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER_PREFERENCE=${LLM_PROVIDER_PREFERENCE:-anthropic}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - OPENAI_API_MODE=${OPENAI_API_MODE:-auto}
      - OPENAI_REASONING_EFFORT=${OPENAI_REASONING_EFFORT:-}
      - OPENAI_TEXT_VERBOSITY=${OPENAI_TEXT_VERBOSITY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - ANTHROPIC_STRONG_MODEL=${ANTHROPIC_STRONG_MODEL:-claude-sonnet-4-6}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-3000}
      - LLM_MAX_ITERATIONS=${LLM_MAX_ITERATIONS:-2}
      - GITHUB_TOKEN=${GITHUB_TOKEN}

    # Configuration (mounted as read-only)
    volumes:
      # Bind the committed example file by default so a fresh clone can
      # `docker compose up` without first creating config.yaml. Override
      # by exporting PPPE_CONFIG_FILE=./config.yaml once you have one.
      - type: bind
        source: ${PPPE_CONFIG_FILE:-./config.yaml.example}
        target: /app/config.yaml
        read_only: true
      - type: volume
        source: app-output
        target: /app/output
      - type: volume
        source: app-logs
        target: /app/logs
      - type: volume
        source: app-data
        target: /app/data

      # SECURITY FIX: Writable temp directories with proper permissions
      # Use tmpfs for temporary files (required for read-only root)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 4294967296  # 4GB for torch temp files
          mode: 1777  # Required when uid/gid cannot be set in Compose tmpfs

      # Cache directory for sentence-transformers (pre-downloaded in image)
      # Note: Model is pre-downloaded in Dockerfile, but runtime may need write access
      - type: tmpfs
        target: /home/appuser/.cache
        tmpfs:
          size: 2147483648  # 2GB for model cache
          mode: 1777  # Required when uid/gid cannot be set in Compose tmpfs

      # Additional writable locations if needed
      - type: tmpfs
        target: /var/tmp
        tmpfs:
          size: 1073741824  # 1GB
          mode: 1777

      # Stream H follow-up (2026-04-28): gunicorn writes its control
      # socket + temp files under ~/.gunicorn. Without this tmpfs the
      # read-only root filesystem trips an "[Errno 30] Read-only file
      # system: '/home/appuser/.gunicorn'" error at boot. Non-fatal but
      # noisy. Sized small — gunicorn only puts socket files here.
      - type: tmpfs
        target: /home/appuser/.gunicorn
        tmpfs:
          size: 67108864  # 64MB
          mode: 1777

    # Port Mapping (Web UI only)
    ports:
      - "8080:8080"

    # Stream A7 — no command override. Dockerfile CMD runs gunicorn against
    # wsgi_production:app. Conversion loops live in the parser-eater-worker
    # sibling service below.

    # Networking
    networks:
      - parser-network

    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    # Restart Policy
    restart: unless-stopped

    # Logging Configuration (STIG V-230289)
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"

  # ==========================================================================
  # Stream A7 — Conversion Worker (sibling of parser-eater)
  # ==========================================================================
  # Same image as parser-eater, runs the async conversion + GitHub-sync +
  # feedback drain + SDL audit loops. NO web server. Shares the app-data
  # volume so it sees the same StateStore JSON snapshot the gunicorn web
  # process reads via follower mode.
  parser-eater-worker:
    build: .
    image: ${PPPE_IMAGE:-ghcr.io/natesmalley/purple-pipeline-parser-eater}:${PPPE_TAG:-latest}
    container_name: purple-parser-eater-worker
    hostname: parser-eater-worker

    user: "999:999"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    command: ["python", "-u", "continuous_conversion_service.py", "--worker-only"]

    # The worker has no web server in --worker-only mode, so the
    # Dockerfile's `curl http://localhost:8080/health` HEALTHCHECK
    # always fails. Disable explicitly. Worker liveness is observable
    # via stdout (RuntimeSnapshot loop logs every 30s).
    healthcheck:
      disable: true

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - APP_ENV=production
      # Stream H (2026-04-28): worker also self-bootstraps via
      # resolve_flask_secret_key reading data/state/flask_secret.key on
      # the shared app-data volume. If the web service started first,
      # the file already exists and the worker reads it. If the worker
      # starts first, it generates and the web service reads. Either
      # ordering is safe. Operator override via env var still works.
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      - STATE_STORE_PATH=/app/data/state/pending_state.json
      - FEEDBACK_CHANNEL_PATH=/app/data/feedback/actions.jsonl
      - FEEDBACK_DRAIN_OFFSET_PATH=/app/data/feedback/drain_offset.json
      - RUNTIME_SNAPSHOT_PATH=/app/data/runtime/status_snapshot.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - ANTHROPIC_STRONG_MODEL=${ANTHROPIC_STRONG_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - OPENAI_STRONG_MODEL=${OPENAI_STRONG_MODEL:-gpt-5.4}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - GEMINI_STRONG_MODEL=${GEMINI_STRONG_MODEL:-gemini-3.1-pro}
      - LLM_PROVIDER_PREFERENCE=${LLM_PROVIDER_PREFERENCE:-anthropic}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      # 2026-04-14 RAG default-on: torch's _dynamo cache lookup calls
      # tempfile.gettempdir() at import time. The compose tmpfs `/tmp` ends up
      # with mode 0o3361 (literal int 1777 gets mapped to permission bits, not
      # treated as octal) so user 999 cannot write there. Point TMPDIR at the
      # persistent app-data volume, same trick parser-eater uses. Also pin the
      # torch inductor cache there so it doesn't re-probe every worker start.
      - TMPDIR=/app/data/tmp
      - TMP=/app/data/tmp
      - TEMP=/app/data/tmp
      - TORCHINDUCTOR_CACHE_DIR=/app/data/tmp/torchinductor
      # 2026-04-14 RAG default-on: point the worker at the Milvus service on
      # the parser-network (parser-eater web service already has these set).
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      # Intentionally NO WEB_UI_AUTH_TOKEN, NO WEB_UI_HOST/PORT, NO
      # WEB_UI_TLS_TERMINATED_UPSTREAM — this container has no web server.

    volumes:
      - type: bind
        source: ${PPPE_CONFIG_FILE:-./config.yaml.example}
        target: /app/config.yaml
        read_only: true
      - type: volume
        source: app-data
        target: /app/data
      - type: volume
        source: app-output
        target: /app/output
      - type: volume
        source: app-logs
        target: /app/logs
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 4294967296
          mode: 1777

    networks:
      - parser-network

    depends_on:
      parser-eater:
        condition: service_healthy

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"

  # ==========================================================================
  # Milvus Vector Database
  # ==========================================================================
  milvus:
    profiles: ["rag"]
    image: milvusdb/milvus:v2.3.0
    container_name: purple-milvus
    hostname: milvus

    # Security: No new privileges
    security_opt:
      - no-new-privileges:true

    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    command: milvus run standalone

    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

    volumes:
      - type: volume
        source: milvus-data
        target: /var/lib/milvus
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 1073741824
          mode: 1770  # SECURITY FIX: Phase 4 - Group-writable only

    # Expose Milvus port to host for development/local access
    ports:
      - "19530:19530"
      - "9091:9091"

    networks:
      - parser-network

    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        compress: "true"

  # ==========================================================================
  # etcd - Milvus Dependency
  # ==========================================================================
  etcd:
    profiles: ["rag"]
    image: quay.io/coreos/etcd:v3.5.5
    container_name: purple-etcd
    hostname: etcd

    # Security: No new privileges
    security_opt:
      - no-new-privileges:true

    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_MAX_REQUEST_BYTES=33554432
      - ETCD_HEARTBEAT_INTERVAL=500
      - ETCD_ELECTION_TIMEOUT=2500

    volumes:
      - type: volume
        source: etcd-data
        target: /etcd

    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd

    expose:
      - "2379"
      - "2380"

    networks:
      - parser-network

    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  # ==========================================================================
  # MinIO - Milvus Object Storage
  # ==========================================================================
  minio:
    profiles: ["rag"]
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: purple-minio
    hostname: minio

    # Security: No new privileges
    security_opt:
      - no-new-privileges:true

    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_BROWSER=off  # Disable web console for security

    volumes:
      - type: volume
        source: minio-data
        target: /minio_data

    command: server /minio_data --console-address ":9001"

    # Internal ports only
    expose:
      - "9000"
      - "9001"

    networks:
      - parser-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

# ============================================================================
# Security Notes
# ============================================================================
# This docker-compose configuration implements:
#
# STIG Controls:
# - V-230276: Non-root container execution
# - V-230285: Read-only root filesystem (ENABLED)
# - V-230286: Minimal capabilities
# - V-230287: No new privileges
# - V-230289: Structured logging
# - V-230290: Resource limits
#
# Read-only Filesystem Security:
# All writable locations use tmpfs with proper permissions:
# - /tmp: 4GB for temporary files (torch, subprocess temp files)
# - /home/appuser/.cache: 2GB for model cache (sentence-transformers)
# - /var/tmp: 1GB for additional temp files
#
# All tmpfs mounts use mode 1770 (group-writable, not world-writable)
# and are owned by appuser (UID 999, GID 999) for security.
#
# FIPS 140-2: NOT certified (requires Red Hat UBI base image).
# Standard Debian bookworm OpenSSL is used without FIPS mode.
#
# Additional Security:
# - Network isolation
# - Secrets via environment variables (use .env file)
# - Health checks on all services
# - Logging with rotation
# - Resource constraints
#
# If you encounter permission errors with read-only filesystem:
# 1. Check tmpfs mounts are created correctly
# 2. Verify UID/GID match appuser (999:999)
# 3. Check application logs for specific errors:
#    docker-compose logs -f parser-eater
#
# Production Deployment:
# 1. Create .env file with secure credentials
# 2. Create data directories: mkdir -p data/{milvus,etcd,minio} output logs data
# 3. Set permissions: chmod 750 data output logs
# 4. Deploy: docker-compose up -d
# 5. Monitor: docker-compose logs -f parser-eater
# ============================================================================
